<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Arquitectura del Computador · Aprendizaje Progresivo Tangible</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #0b1e33;
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        .header {
            background: linear-gradient(135deg, #0b2b5c, #1e3a8a, #3b5b9b);
            border-radius: 2rem 2rem 1rem 1rem;
            padding: 2rem 2rem 1.5rem;
            margin-bottom: 2.5rem;
            color: white;
            box-shadow: 0 20px 30px -10px rgba(0,40,100,0.4);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #dbeafe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            font-size: 1rem;
            font-weight: 400;
            color: #bfdbfe;
            display: block;
        }
        .nav {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            transition: 0.2s;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav a:hover {
            background: #ffffff;
            color: #0b2b5c;
            border-color: white;
        }
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            background: #1e3a8a;
            color: white;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,30,70,0.4);
            z-index: 100;
            transition: 0.2s;
            border: 2px solid white;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.9;
        }
        .scroll-top:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        .intro-block {
            background: linear-gradient(145deg, #ffffff, #eef2ff);
            border-radius: 2.5rem;
            padding: 2.2rem;
            margin-bottom: 3rem;
            border: 1px solid #c7d2fe;
            box-shadow: 0 20px 35px -8px rgba(30,58,138,0.2);
        }
        .intro-block h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #0b2b5c;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 1.8rem 0;
        }
        .badge-item {
            background: #dbeafe;
            border-radius: 3rem;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            color: #1e3a8a;
            font-size: 1rem;
            box-shadow: 0 4px 6px -2px #b3c5ff;
        }
        .main-layout {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }
        .sidebar {
            width: 300px;
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .content-area {
            flex: 1;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .tree {
            list-style: none;
            padding-left: 0;
        }
        .tree li {
            margin: 0.5rem 0;
            cursor: pointer;
        }
        .tree details {
            margin-left: 0.5rem;
        }
        .tree summary {
            font-weight: 600;
            color: #1e3a8a;
            cursor: pointer;
            padding: 0.3rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tree summary:hover {
            color: #2563eb;
        }
        .tree .tema-item {
            padding-left: 1.8rem;
            margin: 0.3rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .tree .tema-item.completado i {
            color: #10b981;
        }
        .tree .tema-item:hover {
            background: #eef2ff;
            border-radius: 1rem;
        }
        .btn-completar {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .btn-completar:hover {
            background: #059669;
        }
        .btn-completar:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .mensaje-exito, .mensaje-error, .mensaje-info {
            padding: 1rem;
            border-radius: 40px;
            text-align: center;
            margin: 1rem 0;
            display: none;
        }
        .mensaje-exito { background: #d4edda; color: #155724; }
        .mensaje-error { background: #f8d7da; color: #721c24; }
        .mensaje-info { background: #d1ecf1; color: #0c5460; }
        .oculto { display: none; }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
        }
        input, select, textarea {
            padding: 0.85rem 1rem;
            border: 1.5px solid #dde4ec;
            border-radius: 18px;
            font-size: 0.95rem;
            background: white;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #2d7ee7;
            box-shadow: 0 0 0 3px rgba(45,126,231,0.15);
        }
        .btn-submit {
            background: #0b2b4f;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1.2rem 2.5rem;
            border: none;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 2.5rem;
        }
        .btn-submit:hover {
            background: #1a4880;
        }
        .footer-note {
            text-align: center;
            color: inherit;
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 2rem;
        }
        @media (max-width: 800px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
        .logout-btn {
            background: #dc2626;
            margin-left: 0.5rem;
        }
        .logout-btn:hover {
            background: #b91c1c;
        }
        .user-info {
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.8rem;
            background: #eef2ff;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'});"><i class="fas fa-arrow-up"></i></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>Arquitectura del Computador <i class="fas fa-microchip" style="color:#bfdbfe;"></i></h1>
                <span>Aprendizaje Progresivo Tangible · Modelo APT</span>
            </div>
            <nav class="nav">
                <a href="#" id="logoutLink" class="logout-btn oculto"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
            </nav>
        </header>

        <!-- SECCIÓN DE REGISTRO/ACCESO -->
        <section id="loginSection" class="intro-block">
            <h2><i class="fas fa-shield-alt" style="color:#1e3a8a;"></i> Acceso al Aula Virtual</h2>
            <p style="font-size:1.2rem; margin-bottom:1.5rem;">Ingresa tu cédula para comenzar. Si es tu primera vez, completa tus datos.</p>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <input type="text" id="cedulaInput" placeholder="V-12345678" style="max-width: 300px; text-align: center;">
                <button class="btn-submit" id="btnAcceder" style="width: auto; padding: 0.8rem 2rem;">Acceder / Registrar</button>
            </div>
            <div id="mensajeExito" class="mensaje-exito"></div>
            <div id="mensajeError" class="mensaje-error"></div>
            <div id="mensajeInfo" class="mensaje-info"></div>
        </section>

        <!-- FORMULARIO DE DATOS ACADÉMICOS (oculto inicialmente) -->
        <div id="datosAcademico" class="oculto">
            <section class="detail-section" style="background: white; border-radius: 2.5rem; padding: 2.2rem;">
                <h2>📚 Completa tu perfil académico</h2>
                <div class="grid-2">
                    <div class="field"><label>Nombres</label><input type="text" id="nombres" required></div>
                    <div class="field"><label>Apellidos</label><input type="text" id="apellidos" required></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>Núcleo</label><select id="nucleoSelect"><option value="La Floresta">La Floresta</option><option value="Altagracia">Altagracia</option></select></div>
                    <div class="field"><label>PNF</label><select id="pnfSelect"><option value="Informática">Informática</option></select></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>Trayecto</label><select id="trayectoSelect"><option value="Arquitectura del Computador">Arquitectura del Computador</option></select></div>
                    <div class="field"><label>Semestre</label><select id="semestreSelect"><option value="I">I</option><option value="II">II</option></select></div>
                </div>
                <button class="btn-submit" id="btnGuardarPerfil">Guardar y acceder a la clase</button>
            </section>
        </div>

        <!-- CONTENIDO PRINCIPAL (oculto inicialmente) -->
        <div id="contenidoPrincipal" class="oculto">
            <div id="userInfoBar" class="user-info"></div>
            <div class="main-layout">
                <div class="sidebar">
                    <h3><i class="fas fa-sitemap"></i> Índice</h3>
                    <div id="arbolNavegacion"></div>
                </div>
                <div class="content-area">
                    <div id="contenidoTema"></div>
                    <button id="btnCompletarTema" class="btn-completar" style="display: none;">✓ Marcar como completado</button>
                </div>
            </div>
        </div>

        <div class="footer-note">⚡ Aprendizaje Progresivo Tangible · Gerard Kenny José Sieveres B.</div>
    </div>

    <script>
        // ========== CONFIGURACIÓN ==========
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8brDVyW6PI_YdgMPKR4SzDl2l6Xl-YNT6uLVpOFubudKEi3bYRIuPJcbtfow9QJbHdA/exec'; // Reemplazar con tu URL
        let estructuraGlobal = null;
        let usuarioActual = { cedula: '', nombres: '', apellidos: '', nucleo: '', pnf: '', trayecto: '', semestre: '' };
        let progresoUsuario = {}; // clave: temaId -> true/false
        let temaSeleccionado = null; // objeto del tema actual

        // ========== CARGAR ESTRUCTURA JSON ==========
        async function cargarEstructura() {
            try {
                const response = await fetch('estructura.json');
                estructuraGlobal = await response.json();
                console.log('✅ Estructura cargada');
                construirArbol();
            } catch (error) {
                console.error('❌ Error cargando estructura.json:', error);
                document.getElementById('arbolNavegacion').innerHTML = '<p class="mensaje-error">Error al cargar el contenido. Asegúrate de que el archivo estructura.json existe.</p>';
            }
        }

        // ========== CONSTRUIR ÁRBOL DE NAVEGACIÓN ==========
        function construirArbol() {
            const contenedor = document.getElementById('arbolNavegacion');
            contenedor.innerHTML = '';
            const trayecto = estructuraGlobal.trayectos[0];
            const ul = document.createElement('ul');
            ul.className = 'tree';

            trayecto.semestres.forEach(semestre => {
                const liSem = document.createElement('li');
                const detailsSem = document.createElement('details');
                const summarySem = document.createElement('summary');
                summarySem.innerHTML = `<i class="fas fa-calendar-alt"></i> ${semestre.titulo}`;
                detailsSem.appendChild(summarySem);
                const ulClases = document.createElement('ul');

                semestre.clases.forEach(clase => {
                    const liClase = document.createElement('li');
                    const detailsClase = document.createElement('details');
                    const summaryClase = document.createElement('summary');
                    summaryClase.innerHTML = `<i class="fas fa-chalkboard"></i> ${clase.titulo}`;
                    detailsClase.appendChild(summaryClase);
                    const ulTemas = document.createElement('ul');

                    clase.temas.forEach(tema => {
                        const liTema = document.createElement('li');
                        liTema.className = 'tema-item';
                        liTema.setAttribute('data-tema-id', tema.id);
                        const icon = document.createElement('i');
                        icon.className = progresoUsuario[tema.id] ? 'fas fa-check-circle completado-badge' : 'far fa-circle';
                        const span = document.createElement('span');
                        span.textContent = tema.titulo;
                        liTema.appendChild(icon);
                        liTema.appendChild(span);
                        liTema.addEventListener('click', (e) => {
                            e.stopPropagation();
                            mostrarTema(tema, clase, semestre, trayecto);
                        });
                        ulTemas.appendChild(liTema);
                    });
                    detailsClase.appendChild(ulTemas);
                    liClase.appendChild(detailsClase);
                    ulClases.appendChild(liClase);
                });
                detailsSem.appendChild(ulClases);
                liSem.appendChild(detailsSem);
                ul.appendChild(liSem);
            });
            contenedor.appendChild(ul);
        }

        // ========== MOSTRAR UN TEMA ==========
        function mostrarTema(tema, clase, semestre, trayecto) {
            temaSeleccionado = { tema, clase, semestre, trayecto };
            const container = document.getElementById('contenidoTema');
            const contenido = tema.contenido;
            let html = `<h2>${tema.titulo}</h2>`;
            if (contenido.texto) html += `<p>${contenido.texto}</p>`;
            if (contenido.imagen) html += `<img src="${contenido.imagen}" style="max-width:100%; border-radius:1rem; margin:1rem 0;" onerror="this.style.display='none'">`;
            if (contenido.audio) html += `<audio controls style="width:100%; margin:1rem 0;"><source src="${contenido.audio}" type="audio/mpeg">Tu navegador no soporta audio.</audio>`;
            if (contenido.video) html += `<iframe width="100%" height="315" src="${contenido.video}" frameborder="0" allowfullscreen style="border-radius:1rem; margin:1rem 0;"></iframe>`;
            if (contenido.quiz) {
                html += `<div class="quiz" data-quiz='${JSON.stringify(contenido.quiz)}'><h3>📝 Cuestionario</h3><p>${contenido.quiz.pregunta}</p>`;
                contenido.quiz.opciones.forEach((opc, idx) => {
                    html += `<div><input type="radio" name="quiz" value="${idx}"> ${opc}</div>`;
                });
                html += `<button id="responderQuiz" class="btn-submit" style="margin-top:0.5rem;">Responder</button><div id="feedbackQuiz"></div></div>`;
            }
            if (tema.consideraciones && tema.consideraciones.length > 0) {
                html += `<h3>📌 Consideraciones</h3><ul>${tema.consideraciones.map(c => `<li>${c}</li>`).join('')}</ul>`;
            }
            container.innerHTML = html;

            const btnCompletar = document.getElementById('btnCompletarTema');
            if (progresoUsuario[tema.id]) {
                btnCompletar.style.display = 'none';
            } else {
                btnCompletar.style.display = 'block';
                btnCompletar.onclick = () => marcarTemaCompletado(tema);
            }

            if (contenido.quiz) {
                document.getElementById('responderQuiz')?.addEventListener('click', () => {
                    const seleccion = document.querySelector('input[name="quiz"]:checked');
                    if (!seleccion) { mostrarMensaje('Selecciona una respuesta', 'error'); return; }
                    const respuesta = parseInt(seleccion.value);
                    const quizData = contenido.quiz;
                    if (respuesta === quizData.correcta) {
                        document.getElementById('feedbackQuiz').innerHTML = `<span style="color:green;">✅ ${quizData.feedback || '¡Correcto!'}</span>`;
                        if (!progresoUsuario[tema.id]) marcarTemaCompletado(tema);
                    } else {
                        document.getElementById('feedbackQuiz').innerHTML = `<span style="color:red;">❌ Incorrecto. ${quizData.feedback || 'Inténtalo de nuevo.'}</span>`;
                    }
                });
            }
        }

        // ========== MARCAR TEMA COMO COMPLETADO Y GUARDAR EN GOOGLE SHEETS ==========
        async function marcarTemaCompletado(tema) {
            if (progresoUsuario[tema.id]) return;

            const data = {
                action: 'progress',
                cedula: usuarioActual.cedula,
                trayecto: temaSeleccionado.trayecto.titulo,
                semestre: temaSeleccionado.semestre.titulo,
                clase: temaSeleccionado.clase.titulo,
                tema: tema.titulo,
                temaId: tema.id,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    progresoUsuario[tema.id] = true;
                    mostrarMensaje('¡Tema completado!', 'exito');
                    // Actualizar árbol visual
                    const liTema = document.querySelector(`.tema-item[data-tema-id="${tema.id}"]`);
                    if (liTema) {
                        liTema.querySelector('i').className = 'fas fa-check-circle completado-badge';
                    }
                    document.getElementById('btnCompletarTema').style.display = 'none';
                } else {
                    throw new Error(result.message || 'Error al guardar');
                }
            } catch (error) {
                console.error('Error guardando progreso:', error);
                mostrarMensaje('Error al guardar el progreso. Intenta de nuevo.', 'error');
            }
        }

        // ========== FUNCIONES DE MENSAJE ==========
        function mostrarMensaje(texto, tipo) {
            const divExito = document.getElementById('mensajeExito');
            const divError = document.getElementById('mensajeError');
            const divInfo = document.getElementById('mensajeInfo');
            if (!divExito || !divError || !divInfo) { alert(`${tipo.toUpperCase()}: ${texto}`); return; }
            divExito.style.display = 'none';
            divError.style.display = 'none';
            divInfo.style.display = 'none';
            if (tipo === 'error') {
                divError.textContent = texto;
                divError.style.display = 'block';
                setTimeout(() => divError.style.display = 'none', 5000);
            } else if (tipo === 'exito') {
                divExito.textContent = texto;
                divExito.style.display = 'block';
                setTimeout(() => divExito.style.display = 'none', 5000);
            } else {
                divInfo.textContent = texto;
                divInfo.style.display = 'block';
                setTimeout(() => divInfo.style.display = 'none', 5000);
            }
        }

        // ========== CARGAR PROGRESO DESDE SHEETS ==========
        async function cargarProgreso(cedula) {
            try {
                const url = `${GOOGLE_APPS_SCRIPT_URL}?action=getProgress&cedula=${encodeURIComponent(cedula)}`;
                const response = await fetch(url, { method: 'GET', mode: 'cors' });
                const data = await response.json();
                if (data.status === 'success') {
                    progresoUsuario = {};
                    data.progreso.forEach(item => {
                        progresoUsuario[item.temaId] = true;
                    });
                    construirArbol(); // reconstruir con nuevos checkmarks
                    mostrarMensaje('Progreso cargado correctamente', 'exito');
                } else {
                    throw new Error(data.message || 'Error al cargar progreso');
                }
            } catch (error) {
                console.error('Error cargando progreso:', error);
                mostrarMensaje('No se pudo cargar tu progreso. Continuarás desde cero.', 'error');
                progresoUsuario = {};
                construirArbol();
            }
        }

        // ========== REGISTRO DE USUARIO ==========
        async function registrarUsuario(userData) {
            const data = {
                action: 'register',
                ...userData,
                timestamp: new Date().toISOString()
            };
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    return true;
                } else {
                    throw new Error(result.message || 'Error en registro');
                }
            } catch (error) {
                console.error('Error registrando usuario:', error);
                mostrarMensaje('Error al registrar. Intenta de nuevo.', 'error');
                return false;
            }
        }

        // ========== INICIAR SESIÓN / VERIFICAR USUARIO ==========
        async function iniciarSesion(cedula) {
            try {
                const url = `${GOOGLE_APPS_SCRIPT_URL}?action=getUser&cedula=${encodeURIComponent(cedula)}`;
                const response = await fetch(url, { method: 'GET', mode: 'cors' });
                const data = await response.json();
                if (data.status === 'success' && data.user) {
                    // Usuario existe: cargar sus datos y progreso
                    usuarioActual = data.user;
                    await cargarProgreso(cedula);
                    mostrarVistaPrincipal();
                } else {
                    // Usuario no existe: mostrar formulario de registro
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('datosAcademico').classList.remove('oculto');
                }
            } catch (error) {
                console.error('Error verificando usuario:', error);
                mostrarMensaje('Error de conexión con el servidor. Intenta más tarde.', 'error');
            }
        }

        function mostrarVistaPrincipal() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('datosAcademico').classList.add('oculto');
            document.getElementById('contenidoPrincipal').classList.remove('oculto');
            document.getElementById('logoutLink').classList.remove('oculto');
            document.getElementById('userInfoBar').innerHTML = `
                <span><i class="fas fa-user-graduate"></i> ${usuarioActual.nombres} ${usuarioActual.apellidos} (${usuarioActual.cedula})</span>
                <span><i class="fas fa-university"></i> ${usuarioActual.nucleo} · ${usuarioActual.semestre}</span>
            `;
        }

        function cerrarSesion() {
            usuarioActual = {};
            progresoUsuario = {};
            temaSeleccionado = null;
            document.getElementById('contenidoPrincipal').classList.add('oculto');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('datosAcademico').classList.add('oculto');
            document.getElementById('logoutLink').classList.add('oculto');
            document.getElementById('cedulaInput').value = '';
            mostrarMensaje('Sesión cerrada', 'info');
        }

        // ========== EVENTOS ==========
        document.addEventListener('DOMContentLoaded', function() {
            cargarEstructura();

            const btnAcceder = document.getElementById('btnAcceder');
            const btnGuardar = document.getElementById('btnGuardarPerfil');
            const logoutLink = document.getElementById('logoutLink');
            const cedulaInput = document.getElementById('cedulaInput');

            btnAcceder.addEventListener('click', () => {
                const cedula = cedulaInput.value.trim();
                if (!cedula) {
                    mostrarMensaje('Por favor ingrese una cédula', 'error');
                    return;
                }
                iniciarSesion(cedula);
            });

            btnGuardar.addEventListener('click', async () => {
                const nombres = document.getElementById('nombres').value.trim();
                const apellidos = document.getElementById('apellidos').value.trim();
                const nucleo = document.getElementById('nucleoSelect').value;
                const pnf = document.getElementById('pnfSelect').value;
                const trayecto = document.getElementById('trayectoSelect').value;
                const semestre = document.getElementById('semestreSelect').value;

                if (!nombres || !apellidos) {
                    mostrarMensaje('Complete nombres y apellidos', 'error');
                    return;
                }

                const userData = {
                    cedula: cedulaInput.value.trim(),
                    nombres,
                    apellidos,
                    nucleo,
                    pnf,
                    trayecto,
                    semestre
                };

                const success = await registrarUsuario(userData);
                if (success) {
                    usuarioActual = userData;
                    await cargarProgreso(userData.cedula);
                    mostrarVistaPrincipal();
                }
            });

            logoutLink.addEventListener('click', (e) => {
                e.preventDefault();
                cerrarSesion();
            });
        });
    </script>
</body>
</html>
